{% set name = "pymust" %}
{% set version = "0.1.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pymust-{{ version }}.tar.gz
  sha256: ae13377d59eb4c89fa384723c289a8edac81b1c00d0965ba1bc070e28e949ce3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base
    - numpy
    - scipy

test:
  imports:
    - pymust
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/PyMUST/
  summary: Python port of the MUST toolbox for ultrasound signal processing and generation of simulated signals
  license: LGPL-2.1
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gbernardino
